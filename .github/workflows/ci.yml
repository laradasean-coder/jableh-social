name: CI

on:
  push:
  pull_request:

jobs:
  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGPASSWORD: postgres
      PSQL: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1
    steps:
      - uses: actions/checkout@v4
      - name: تطبيق طبقة التوافق + الهجرات + البذور + التأكيدات
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          $PSQL -f supabase/tests/00_shims.sql
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "==> $f"; $PSQL -f "$f"
          done
          $PSQL -f supabase/tests/90_seed.sql
          $PSQL -f supabase/tests/99_assert.sql

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npx vitest run
      - run: npm run build
